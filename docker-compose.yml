# contenedor de servidor web (Apache con PHP) listo para desplegar  
# y desarrollar tu aplicación del Trabajo Práctico Final
services:
  web:
    image: php:8.1-apache # O la versión de PHP que uses
    container_name: tp_final_web
    command: >
      sh -c "docker-php-ext-install pdo pdo_mysql && apache2-foreground"
    volumes:
      - .:/var/www/html
    ports:
      - "8081:80" # 👈 MAPEAMOS AL PUERTO 8080 PARA NO PISAR XAMPP
    extra_hosts:
      - "host.docker.internal:host-gateway" # 👈 LA MAGIA PARA VER TU MYSQL LOCAL

# Observabilidad y Monitoreo en Tiempo Real.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg:/dev/kmsg

  
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"


  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      # ESTA LÍNEA INYECTA LA CONFIGURACIÓN CORRECTA DIRECTAMENTE:
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysql-exporter
    environment:
      DATA_SOURCE_NAME: "root:@(host.docker.internal:3306)/"
    ports:
      - "9104:9104"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

# ... (Tus otros servicios como Grafana, Prometheus, etc.)

  fail2ban-exporter:
    # Esta imagen es pública, oficial y la más usada para el exporter de fail2ban
    image: registry.gitlab.com/hctrdev/fail2ban-prometheus-exporter:latest
    container_name: fail2ban-exporter
    restart: unless-stopped
    ports:
      - "9121:9191" # 👈 OJO AQUÍ: El contenedor escucha internamente en el 9191, lo mapeamos al 9121 de tu TP
    volumes:
      # Tip de oro: Es mejor montar la carpeta contenedora porque fail2ban borra y recrea el .sock al reiniciar
      - /var/run/fail2ban:/var/run/fail2ban:ro
    networks:
      - mi_red_externa

networks:
  mi_red_externa:
    external: true
    name: tp_final_8_default
    
# 1. cAdvisor: Monitorización de contenedores (Acceso: http://localhost:8082)
# 2. Prometheus: Base de datos de métricas (Acceso: http://localhost:9090)
# 3. Grafana: Interfaz visual de gráficos (Acceso: http://localhost:3000)
# 4. server web: Interfaz visual de la pagina web:(Acceso: http://localhost:8081)
# 5. Base de datos Mysql: Interfaz visual de la Base de datos (Acceso: http://localhost/phpmyadmin/index.php?route=/server/databases)
# 6. github: Url Repositorio:(Acceso: Git clone: https://github.com/digitalestecnologias21/Tp_final_8.git)