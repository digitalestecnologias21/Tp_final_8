
services:
  web:
    image: php:8.1-apache # O la versión de PHP que uses
    container_name: tp_final_web
    command: >
      sh -c "docker-php-ext-install pdo pdo_mysql && apache2-foreground"
    volumes:
      - .:/var/www/html
    ports:
      - "8081:80" # 👈 MAPEAMOS AL PUERTO 8080 PARA NO PISAR XAMPP
    extra_hosts:
      - "host.docker.internal:host-gateway" # 👈 LA MAGIA PARA VER TU MYSQL LOCAL

  # Prometheus: El motor que recolecta las métricas probar http://localhost:9090
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway" # 👈 También lo necesita para ver el exporter si hiciera falta

  # 2.Grafana: La interfaz visual para ver los gráficos Probar con http://localhost:3000/login (admin=charly)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped

  # 3. MySQL Exporter: Configurado para apuntar a tu XAMPP local
  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysql-exporter
    environment:
      # 1. Usamos 'host.docker.internal' para salir de Docker e ir a tu XAMPP
      # 2. Deja la contraseña vacía si en tu XAMPP no le pusiste contraseña al root
      DATA_SOURCE_NAME: "root:@(host.docker.internal:3306)/"
    ports:
      - "9104:9104"
    extra_hosts:
      - "host.docker.internal:host-gateway" # 👈 LA MAGIA para que el exporter pueda ver tu XAMPP
    restart: unless-stopped